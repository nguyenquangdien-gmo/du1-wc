<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">DU1 World Cup</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <style>
        body { background-color: #1a1a2e; color: white; font-family: 'Outfit', sans-serif; padding-top: 75px; }
        .navbar { background-color: #000; box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.8); border-bottom: 2px solid #e94560; z-index: 1030; }
        .card { background-color: #16213e; border: 1px solid #0f3460; border-radius: 12px; color: white !important; }
        .match-card { transition: 0.3s; cursor: pointer; border: 1px solid #1a1a2e; }
        .match-card:hover { transform: translateY(-5px); border-color: #e94560; box-shadow: 0px 8px 25px rgba(233, 69, 96, 0.2); }
        .badge-live { background-color: #e94560; box-shadow: 0 0 10px #e94560; }
        .badge-ready { background-color: #2a5298; }
        .badge-scheduled { background-color: #444; opacity: 0.6; }
        .badge-finished { background-color: #000; border: 1px solid #333; }
        .prediction-btn { background-color: #0f3460; border: 1px solid #2a5298; color: white; border-radius: 8px; font-weight: 500; transition: 0.2s; }
        .prediction-btn:hover, .prediction-btn.active { background-color: #e94560; border-color: #e94560; color: white; box-shadow: 0 0 10px rgba(233, 69, 96, 0.4); }
        
        /* Brilliant Live Match Styling */
        .match-card-live {
            border: 2px solid #e94560 !important;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.4) !important;
            animation: pulse-live 2s infinite !important;
            transform: scale(1.02);
            z-index: 10;
        }
        @keyframes pulse-live {
            0% { box-shadow: 0 0 10px rgba(233, 69, 96, 0.4); }
            50% { box-shadow: 0 0 25px rgba(233, 69, 96, 0.8), 0 0 40px rgba(233, 69, 96, 0.3); }
            100% { box-shadow: 0 0 10px rgba(233, 69, 96, 0.4); }
        }
        .badge-live { 
            background-color: #e94560; 
            box-shadow: 0 0 15px #e94560;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .badge-live::before {
            content: "";
            width: 8px;
            height: 8px;
            background-color: white;
            border-radius: 50%;
            display: inline-block;
            animation: blinker 1s linear infinite;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }
        
        /* Modal & Dialog position fix */
        .modal-dialog { margin-top: 90px !important; }
        .ui-dialog { background-color: #16213e !important; color: white !important; border: 1px solid #e94560 !important; border-radius: 12px !important; box-shadow: 0 10px 30px rgba(0,0,0,0.8) !important; padding: 0 !important; z-index: 3000 !important; top: 100px !important; }
        .ui-dialog-titlebar { background: #0f3460 !important; border: none !important; color: #e94560 !important; font-weight: bold !important; padding: 12px 20px !important; }
        .ui-dialog-content { padding: 20px !important; font-size: 1rem !important; color: #e0e0e0 !important; }
        .ui-dialog-buttonpane { background: #0f3460 !important; border-top: 1px solid #2a5298 !important; padding: 10px 20px !important; }
        .ui-button { background: #e94560 !important; color: white !important; border: none !important; border-radius: 6px !important; padding: 6px 20px !important; font-weight: 600 !important; }
        .ui-button:hover { background: #d1304b !important; }
        .ui-dialog-titlebar-close { display: none !important; }
        .ui-widget-overlay { background: rgba(0,0,0,0.7) !important; opacity: 1 !important; }

        /* Loading Overlay */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.3s ease;
        }
        .spinner-wc {
            width: 60px;
            height: 60px;
            border: 5px solid #0f3460;
            border-top: 5px solid #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.3);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: #e94560;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* Sidebar Leaderboard */
        .sidebar-right {
            position: fixed;
            top: 75px; /* Below Navbar */
            right: -350px;
            width: 350px;
            height: calc(100vh - 75px);
            background-color: #16213e;
            z-index: 1060;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid #e94560;
            overflow: visible; /* To allow toggle tab to be visible */
            padding: 15px 0;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        .sidebar-right.open {
            right: 0;
        }
        
        /* Toggle Tab */
        .sidebar-toggle-tab {
            position: absolute;
            left: -32px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 80px;
            background-color: #e94560;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px 0 0 8px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.3);
            font-size: 1.2rem;
            z-index: 1061;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #mainContent {
            transition: margin-right 0.3s ease;
        }
        
        /* Desktop: Fixed by default */
        @media (min-width: 992px) {
            .sidebar-right.open {
                right: 0;
            }
            #mainContent.shifted {
                margin-right: 350px;
            }
        }

        @media (max-width: 991px) {
            .sidebar-right { width: 100%; right: -100%; top: 75px; }
            .sidebar-right.open { right: 0; }
            #mainContent { margin-right: 0 !important; }
        }

        /* Sticky Header for Leaderboard */
        .sidebar-scroll {
            overflow-y: auto;
            flex-grow: 1;
            height: 100%;
        }
        .sidebar-scroll table {
            border-collapse: separate;
            border-spacing: 0;
        }
        .sidebar-scroll thead th {
            position: sticky;
            top: 0;
            background-color: #0f3460 !important;
            z-index: 20;
            outline: 1px solid #e94560;
        }

        /* Comment Styles */
        .comment-item { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .comment-user { color: #e94560; font-weight: bold; font-size: 0.9rem; margin-bottom: 4px; }
        .comment-content { font-size: 0.95rem; line-height: 1.4; color: #e0e0e0; white-space: pre-wrap; word-break: break-word; }
        .comment-time { font-size: 0.75rem; color: #888; margin-top: 5px; }
        .reaction-bar { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .reaction-btn { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 20px; padding: 2px 10px; font-size: 0.8rem; cursor: pointer; transition: 0.2s;
            color: #ccc;
        }
        .reaction-btn:hover { background: rgba(233, 69, 96, 0.2); border-color: #e94560; }
        .reaction-btn.active { background: #e94560; border-color: #e94560; color: white !important; }
        .reaction-picker { display: flex; gap: 10px; margin-top: 5px; }
        .picker-btn { font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .picker-btn:hover { transform: scale(1.3); }

        .btn-comment { 
            background: transparent; color: #888; border: 1px solid #333; 
            border-radius: 8px; padding: 4px 12px; font-size: 0.8rem; transition: 0.2s;
        }
        .btn-comment:hover { color: #e94560; border-color: #e94560; }
    </style>
</head>
<body>

            <div class="tab-content" id="matchesTabContent">

                <div class="tab-pane fade" id="tab-final" role="tabpanel"><div class="row g-4" id="container-final"></div></div>

        </div>

    <!-- Leaderboard Sidebar -->

<!-- Prediction Modal -->

<!-- Account Settings Modal -->

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const token = localStorage.getItem('token');
    
    if (!token) {
        window.location.href = '/';
    }
    
    let selectedTeamValue = "";

    // Giải quyết xung đột focus giữa Bootstrap Modal và jQuery UI Dialog
    // Ngăn chặn lỗi "Maximum call stack size exceeded" và không focus được input
    if ($.ui && $.ui.dialog) {
        $.ui.dialog.prototype._focusTabbable = function() {};
    }
    
    // Bản sửa lỗi triệt để cho Bootstrap 5 và jQuery UI
    document.addEventListener('focusin', function (e) {
        if (e.target.closest('.ui-dialog')) {
            e.stopImmediatePropagation();
        }
    }, true);

    function escapeHTML(str) {
        if (!str) return "";
        return str.replace(/[&<>"']/g, function(m) {
            return {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[m];
        });
    }

    function showMsg(message, title = "Thông báo", callback = null) {
        $("#dialog-text").html(message);
        $("#dialog-msg").dialog({
            title: title, modal: true, width: 350,
            resizable: false,
            buttons: {
                "Đóng": function() {
                    $(this).dialog("close");
                    if (callback) callback();
                }
            }
        });
    }

    function showConfirm(message, callback) {
        $("#confirm-text").html(message);
        const dialog = $("#dialog-confirm").dialog({
            title: "Xác nhận", modal: true, width: 350,
            resizable: false,
            buttons: {
                "Đồng ý": function() {
                    $(this).dialog("close");
                    if (callback) callback();
                },
                "Hủy": function() {
                    $(this).dialog("close");
                }
            }
        });
    }

    function showPrompt(message, oldContent, callback) {
        $("#prompt-message").text(message);
        $("#prompt-input").val(oldContent);
        $("#dialog-prompt").dialog({
            title: "Chỉnh sửa", modal: true, width: 400,
            resizable: false,
            buttons: {
                "Lưu": function() {
                    const val = $("#prompt-input").val();
                    $(this).dialog("close");
                    if (callback) callback(val);
                },
                "Hủy": function() {
                    $(this).dialog("close");
                }
            }
        });
    }

    function setupAjaxAuth() {
        $.ajaxSetup({
            beforeSend: function(xhr) {
                xhr.setRequestHeader('Authorization', 'Bearer ' + token);
            }
        });
    }

    $(document).ready(function() {
        setupAjaxAuth();
        checkUser();
        loadMatches();
        loadLeaderboard();
        
        // Initialize Dialog once
        $("#dialog-msg").dialog({
            autoOpen: false,
            modal: true,
            width: 350,
            classes: { "ui-dialog": "shadow-lg" }
        });

        setInterval(() => {
            loadMatches(true);
            if ($('#leaderboardSidebar').hasClass('open')) loadLeaderboard();
        }, 30000);
        
        if (window.innerWidth >= 992) {
            $('#mainContent').addClass('shifted');
        }
    });

    function formatUserDisplay(fullName, email) {
        let name = fullName;
        if (!name) {
            name = email ? email.split('@')[0] : "Unknown";
        }
        if (name.length > 20) return name.substring(0, 17) + "...";
        return name;
    }

    let currentUser = null;
    function checkUser() {
        $.get('/api/auth/me', function(user) {
            currentUser = user;
            if (user.is_admin) $('#adminLink').show();
            $('#userInfo').text(formatUserDisplay(user.full_name, user.email));
            $('#settingsFullName').val(user.full_name || "");
        }).fail(() => logout());

        $.get('/api/admin/active-year', function(data) {
            $('#navYear').text("DU1 World Cup " + data.year);
            $('#pageTitle').text("DU1 WC " + data.year);
        });
    }

    function logout() {
        localStorage.removeItem('token');
        window.location.href = '/';
    }

    function loadMatches(isSilent = false) {
        if (!isSilent) {
            $('#loadingOverlay').show().css('opacity', '1');
        }

        $.get('/api/matches', function(data) {
            let containers = {
                'groups': $('#container-groups'),
                '32': $('#container-32'),
                '16': $('#container-16'),
                'quarter': $('#container-quarter'),
                'semi': $('#container-semi'),
                'third': $('#container-third'),
                'final': $('#container-final')
            };
            Object.values(containers).forEach(c => c.empty());
            
            const isShowNext6 = $('#showNext6').is(':checked');
            const isShowLive = $('#showLive').is(':checked');

            if (isShowNext6 || isShowLive) {
                $('#matchTabs').hide();
                containers['groups'].empty();
                if (isShowLive) {
                    containers['groups'].append('<div class="col-12 mt-2 mb-2"><h5 class="text-danger border-start border-danger border-4 ps-2 text-start text-uppercase small fw-bold">Trận đấu đang diễn ra</h5></div>');
                } else {
                    containers['groups'].append('<div class="col-12 mt-2 mb-2"><h5 class="text-info border-start border-info border-4 ps-2 text-start text-uppercase small fw-bold">6 Trận đấu tiếp theo</h5></div>');
                }
            } else {
                $('#matchTabs').show();
            }

                const matchesByGroup = {};
                window.allMatchesMap = {}; // Global map to store match data safely

                data.forEach(m => {
                    window.allMatchesMap[m.id] = m;
                    const g = m.group_name || m.stage;
                    if (!matchesByGroup[g]) matchesByGroup[g] = [];
                    matchesByGroup[g].push(m);
                });
                
                function getMatchHTML(m) {
                    let badgeClass = '';
                    let statusText = m.status;
                    let elapsedHtml = '';
                    
                    if (m.status === 'LIVE') {
                        badgeClass = 'badge-live';
                        // Calculate elapsed time
                        const start = new Date(m.start_time);
                        const now = new Date();
                        const diffMs = now - start;
                        const diffMins = Math.max(0, Math.floor(diffMs / 60000));
                        elapsedHtml = `<span class="badge bg-danger ms-2" style="font-size: 0.65rem;">${diffMins}'</span>`;
                    }
                    else if (m.status === 'READY') badgeClass = 'badge-ready';
                    else if (m.status === 'FINISHED') badgeClass = 'badge-finished';
                    else badgeClass = 'badge-scheduled';

                    let scoreText = (m.status === 'READY' || m.status === 'SCHEDULED') ? 'VS' : `${m.home_score} - ${m.away_score}`;
                    let timeStr = new Date(m.start_time).toLocaleString('vi-VN', { 
                        day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' 
                    });
                    
                    let groupInfo = m.group_name ? `Bảng ${m.group_name}` : "";
                    let oddsDisplay = m.odds ? `<div class="mt-2"><span class="badge bg-dark border border-warning text-warning fw-normal">Kèo: ${m.odds.favorite_team} chấp ${m.odds.handicap}</span></div>` : '';

                    let stageClass = m.status === 'LIVE' ? 'match-card-live' : '';
                    let cCount = m.comment_count > 0 ? `<span class="badge rounded-pill bg-danger ms-1" style="font-size: 0.6rem;">${m.comment_count}</span>` : '';

                    return `
                    <div class="col-md-6 col-lg-4">
                        <div class="card match-card ${stageClass} p-3 h-100 text-center" onclick='openPredictionModal(${m.id})'>
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div class="d-flex flex-column align-items-start">
                                    <div>
                                        <span class="badge ${badgeClass} text-uppercase mb-1" style="font-size: 0.6rem;">${statusText}</span>
                                        ${elapsedHtml}
                                    </div>
                                    ${groupInfo ? `<span class="badge bg-info text-dark fw-bold" style="font-size: 0.6rem;">${groupInfo}</span>` : ''}
                                </div>
                                <div class="text-end">
                                    <small class="text-warning d-block fw-bold" style="font-size: 0.75rem;">${m.stadium}</small>
                                    <small class="text-light opacity-50" style="font-size: 0.7rem;">${timeStr}</small>
                                </div>
                            </div>
                            <div class="d-flex flex-column gap-2">
                                 <div class="d-flex align-items-center justify-content-center gap-2">
                                    <img src="${m.home_team_flag}" style="width:24px; height:auto; border-radius:3px; box-shadow: 0 0 5px rgba(0,0,0,0.5)">
                                    <span class="fw-bold text-truncate" style="max-width: 120px;">${m.home_team_vn || m.home_team}</span>
                                 </div>
                                <div class="fw-bold fs-3 text-danger my-1">${scoreText}</div>
                                <div class="d-flex align-items-center justify-content-center gap-2">
                                    <img src="${m.away_team_flag}" style="width:24px; height:auto; border-radius:3px; box-shadow: 0 0 5px rgba(0,0,0,0.5)">
                                    <span class="fw-bold text-truncate" style="max-width: 120px;">${m.away_team_vn || m.away_team}</span>
                                </div>
                            </div>
                            <div class="mt-2">${oddsDisplay}</div>
                            ${m.locked ? '<div class="mt-2 text-secondary"><small>🔒 Locked</small></div>' : ''}
                            
                            <!-- Comment Button -->
                            <div class="mt-3 pt-2 border-top border-secondary border-opacity-25 d-flex justify-content-center">
                                <button class="btn btn-comment w-100" onclick="event.stopPropagation(); window.openCommentModal(${m.id})">
                                    💬 Bình luận ${cCount}
                                </button>
                            </div>
                        </div>
                    </div>`;
                }

            if (isShowLive) {
                let liveMatches = data.filter(m => m.status === 'LIVE');
                if (liveMatches.length === 0) {
                    containers['groups'].append('<div class="col-12 text-center py-5 opacity-50">Hiện không có trận đấu nào đang diễn ra.</div>');
                } else {
                    liveMatches.forEach(m => containers['groups'].append(getMatchHTML(m)));
                }
            } else if (isShowNext6) {
                let upcoming = data.filter(m => m.status !== 'FINISHED' && m.status !== 'LIVE')
                                  .sort((a,b) => new Date(a.start_time) - new Date(b.start_time))
                                  .slice(0, 6);
                
                upcoming.forEach(m => {
                    containers['groups'].append(getMatchHTML(m));
                });
            } else {
                let groupStagesDict = {};
                data.forEach(m => {
                    let html = getMatchHTML(m);
                    let s = (m.stage || "").toLowerCase();
                    if (s.includes("vòng 32")) { containers['32'].append(html); }
                    else if (s.includes("vòng 16") || s.includes("round of 16")) { containers['16'].append(html); }
                    else if (s.includes("tứ kết") || s.includes("quarter")) { containers['quarter'].append(html); }
                    else if (s.includes("bán kết") || s.includes("semi")) { containers['semi'].append(html); }
                    else if (s.includes("hạng 3") || s.includes("third")) { containers['third'].append(html); }
                    else if (s.includes("chung kết") || s.includes("final")) { containers['final'].append(html); }
                    else {
                        if (!groupStagesDict[m.stage]) { groupStagesDict[m.stage] = ""; }
                        groupStagesDict[m.stage] += html;
                    }
                });

                Object.keys(groupStagesDict).sort().forEach(g => {
                    containers['groups'].append(`<div class="col-12 mt-4 mb-2"><h5 class="text-warning border-start border-warning border-4 ps-2 text-start text-uppercase small fw-bold">${g.includes(' - ') ? g.split(' - ')[1] : g}</h5></div>`);
                    containers['groups'].append(groupStagesDict[g]);
                });
            }

        }).fail(function(err) {
            if(err.status === 401) logout();
        }).always(function() {
            if (!isSilent) {
                $('#loadingOverlay').fadeOut(300);
            }
        });
    }

    function openPredictionModal(matchId) {
        const match = window.allMatchesMap[matchId];
        if (!match) return;
        
        $('#predictMatchId').val(match.id);
        const name1 = match.home_team_vn || match.home_team;
        const name2 = match.away_team_vn || match.away_team;
        $('#predictMatchTitle').text(`${name1} vs ${name2}`);
        
        selectedTeamValue = ""; // reset
        $('#btnHome').html(`<img src="${match.home_team_flag}" class="me-2" style="width:20px"> ${name1}`).removeClass('active');
        $('#btnAway').html(`<img src="${match.away_team_flag}" class="me-2" style="width:20px"> ${name2}`).removeClass('active');
        
        let drawBtn = $('#btnDraw');
        if (!drawBtn.length) {
            $('#btnAway').after('<button class="btn prediction-btn px-4 py-2" id="btnDraw" onclick="selectTeam(this)">Hòa</button>');
            drawBtn = $('#btnDraw');
        }
        drawBtn.removeClass('active');

        if (match.odds && Number.isInteger(match.odds.handicap)) {
            drawBtn.show();
        } else {
            drawBtn.hide();
        }
        
        let odds = match.odds;
        if(odds) {
            $('#oddsText').html(`<strong>${odds.favorite_team} chấp ${odds.handicap}</strong><br><small class="opacity-75">${odds.analysis_text}</small>`);
        } else {
            $('#oddsText').html('Chưa có kèo / AI đang phân tích.');
        }

        let isLocked = match.locked || match.status !== 'READY';
        // Admin exception: allow predictions for testing/correction
        if (currentUser && currentUser.is_admin) {
            isLocked = false;
        }

        $('#btnHome, #btnAway, #btnDraw, #luckyStar, #btnSubmitPredict').prop('disabled', isLocked);
        
        // Specifically block admin@runsystem.net from voting as requested
        if (currentUser && currentUser.email === 'admin@runsystem.net') {
            $('#btnSubmitPredict').hide();
        } else if (currentUser && currentUser.is_admin) {
            $('#btnSubmitPredict').show().prop('disabled', false);
        } else {
            $('#btnSubmitPredict').show();
        }
        
        if (match.lucky_star_enabled && match.status === 'READY') {
            $('#luckyStarContainer').show();
        } else {
            $('#luckyStarContainer').hide();
        }
        
        loadOtherPredictions(match.id);
        var modal = new bootstrap.Modal(document.getElementById('predictModal'));
        modal.show();
    }

    function selectTeam(btn) {
        $('.prediction-btn').removeClass('active');
        $(btn).addClass('active');
        if ($(btn).attr('id') === 'btnDraw') {
            selectedTeamValue = "Hòa";
        } else {
            let homeName = $('#predictMatchTitle').text().split(' vs ')[0];
            let awayName = $('#predictMatchTitle').text().split(' vs ')[1];
            selectedTeamValue = ($(btn).attr('id') === 'btnHome') ? homeName : awayName;
        }
    }

    function setLoadingState(btnId, isLoading) {
        const btn = $(`#${btnId}`);
        if (isLoading) btn.addClass('btn-loading');
        else btn.removeClass('btn-loading');
    }

    function submitPrediction() {
        if (!selectedTeamValue) return showMsg('Vui lòng chọn 1 lựa chọn trước khi lưu!', 'Thông báo');
        
        let payload = {
            match_id: parseInt($('#predictMatchId').val()),
            chosen_team: selectedTeamValue,
            use_lucky_star: $('#luckyStar').is(':checked')
        };
        
        setLoadingState('btnSubmitPredict', true);
        $.ajax({
            url: "/api/predictions", type: "POST",
            contentType: "application/json", data: JSON.stringify(payload),
            success: function(res) {
                showMsg('Dự đoán của bạn đã được ghi nhận!', 'Thành công', () => {
                   bootstrap.Modal.getInstance(document.getElementById('predictModal')).hide();
                   loadMatches();
                });
            },
            error: function(err) {
                showMsg(err.responseJSON?.detail || "Không thể lưu dự đoán", 'Lỗi');
            },
            complete: () => setLoadingState('btnSubmitPredict', false)
        });
    }

    function loadOtherPredictions(matchId) {
        $.get(`/api/predictions/match/${matchId}`, function(data) {
            let list = $('#otherPredictionsList');
            list.empty();
            if(data.length === 0) list.append('<li class="list-group-item text-secondary bg-transparent border-secondary text-center small opacity-50">Chưa có ai dự đoán trận này</li>');
            
            data.forEach(p => {
                let badgeMe = p.is_me ? '<span class="badge bg-primary ms-1" style="font-size:0.6rem">BẠN</span>' : '';
                let star = p.use_lucky_star ? '🌟' : '';
                let displayName = formatUserDisplay(p.user_full_name, p.user_email);
                
                let item = `<li class="list-group-item bg-transparent border-secondary border-opacity-25 text-light d-flex justify-content-between align-items-center py-2">
                    <span class="small">${displayName}${badgeMe}</span>
                    <span class="text-info fw-bold small">${p.chosen_team} ${star}</span>
                </li>`;
                list.append(item);
                
                if (p.is_me) {
                    if ($('#btnHome').text().trim() === p.chosen_team) { selectTeam(document.getElementById('btnHome')); }
                    else if ($('#btnAway').text().trim() === p.chosen_team) { selectTeam(document.getElementById('btnAway')); }
                    else if (p.chosen_team === "Hòa") { selectTeam(document.getElementById('btnDraw')); }
                    $('#luckyStar').prop('checked', p.use_lucky_star);
                }
            });
        });
    }

    let leaderboardData = [];
    let sortAsc = false;

    function loadLeaderboard() {
        $.get('/api/leaderboard', function(data) {
            leaderboardData = data;
            renderLeaderboard();
        });
    }

    function toggleSortLeaderboard() {
        sortAsc = !sortAsc;
        $('#sortDir').text(sortAsc ? '▲' : '▼');
        renderLeaderboard();
    }

    function toggleLeaderboard() {
        const sidebar = $('#leaderboardSidebar');
        const main = $('#mainContent');
        
        sidebar.toggleClass('open');
        if (window.innerWidth >= 992) {
            main.toggleClass('shifted');
        }
        
        if (sidebar.hasClass('open')) {
            loadLeaderboard();
        }
    }

    function renderLeaderboard() {
        let sorted = [...leaderboardData].sort((a, b) => {
            return sortAsc ? (a.money_lost - b.money_lost) : (b.money_lost - a.money_lost);
        });

        let body = $('#leaderboardBody');
        body.empty();
        sorted.forEach((u, index) => {
            let displayName = formatUserDisplay(u.full_name, u.email);
            let rankClass = "";
            if (index === 0) rankClass = "text-warning";
            else if (index === 1) rankClass = "text-light";
            else if (index === 2) rankClass = "text-danger";
            
            body.append(`
                <tr class="${index < 3 ? 'bg-dark bg-opacity-25' : ''}">
                    <td class="ps-2 fw-bold ${rankClass}">${index + 1}</td>
                    <td class="fw-bold text-info">${displayName}</td>
                    <td class="text-center">
                        <span class="text-success">${u.total_correct}</span><span class="mx-1 opacity-50">/</span><span class="text-danger">${u.total_wrong}</span>
                    </td>
                    <td class="text-end pe-2 text-warning fw-bold">-${u.money_lost.toLocaleString('vi-VN')} DU1</td>
                </tr>
            `);
        });
    }

    function openAccountSettingsModal() {
        $('#oldPassword, #newPassword, #confirmNewPassword').val('');
        if (currentUser) $('#settingsFullName').val(currentUser.full_name || "");
        new bootstrap.Modal(document.getElementById('accountSettingsModal')).show();
    }

    // --- COMMENT SYSTEM ---
    let currentMatchIdForComments = null;
    let commentRefreshInterval = null;

    window.openCommentModal = function(matchId) {
        const match = window.allMatchesMap[matchId];
        if (!match) return;
        currentMatchIdForComments = match.id;
        $('#commentMatchTitle').text(`${match.home_team_vn || match.home_team} vs ${match.away_team_vn || match.away_team}`);
        $('#commentContent').val('');
        loadComments(match.id);
        
        const modal = new bootstrap.Modal(document.getElementById('commentModal'));
        modal.show();

        // Auto refresh every minute
        if (commentRefreshInterval) clearInterval(commentRefreshInterval);
        commentRefreshInterval = setInterval(() => {
            if (currentMatchIdForComments) loadComments(currentMatchIdForComments);
        }, 60000);
    }

    // Clear interval when modal hidden
    document.getElementById('commentModal').addEventListener('hidden.bs.modal', function () {
        if (commentRefreshInterval) {
            clearInterval(commentRefreshInterval);
            commentRefreshInterval = null;
        }
        currentMatchIdForComments = null;
    });

    function loadComments(matchId) {
        $('#commentList').html('<div class="text-center py-3 opacity-50 small">Đang tải bình luận...</div>');
        $.get(`/api/matches/${matchId}/comments`, function(data) {
            window.allCommentsMap = {}; // Reset map cho mỗi lần load
            data.forEach(c => window.allCommentsMap[c.id] = c.content);
            renderComments(data);
        });
    }

    function renderComments(comments) {
        const list = $('#commentList');
        list.empty();
        if (comments.length === 0) {
            list.append('<div class="text-center py-5 opacity-50 small">Chưa có bình luận nào. Hãy là người đầu tiên!</div>');
            return;
        }

        const reactionIcons = { '👍': '👍', '❤️': '❤️', '😂': '😂', '😮': '😮', '😢': '😢' };

        comments.forEach(c => {
            const time = new Date(c.created_at).toLocaleString('vi-VN');
            const displayName = c.user_full_name || c.user_email_prefix;
            
            let reactionsHtml = '';
            c.reactions.forEach(r => {
                reactionsHtml += `
                    <button class="reaction-btn ${r.user_reacted ? 'active' : ''}" onclick="toggleReaction(${c.id}, '${r.reaction_type}')">
                        ${r.reaction_type} ${r.count}
                    </button>`;
            });

            // Picker for new reactions
            let pickerHtml = '<div class="reaction-picker">';
            ['👍', '❤️', '😂', '😮', '😢'].forEach(icon => {
                const already = c.reactions.find(r => r.reaction_type === icon && r.user_reacted);
                if (!already) {
                    pickerHtml += `<span class="picker-btn" onclick="toggleReaction(${c.id}, '${icon}')">${icon}</span>`;
                }
            });
            pickerHtml += '</div>';

            const isOwner = currentUser && c.user_id === currentUser.id;
            const isAdmin = currentUser && currentUser.is_admin;
            
            let actionsHtml = '';
            if (isOwner || isAdmin) {
                actionsHtml = `
                    <div class="comment-actions mt-1">
                        ${isOwner ? `<button class="btn btn-link btn-sm text-info p-0 me-2" onclick="editComment(${c.id})" title="Sửa">✏️</button>` : ''}
                        <button class="btn btn-link btn-sm text-danger p-0" onclick="deleteComment(${c.id})" title="Xóa">🗑️</button>
                    </div>
                `;
            }

            list.append(`
                <div class="comment-item">
                    <div class="d-flex justify-content-between align-items-start">
                        <div class="comment-user">${displayName}</div>
                        ${actionsHtml}
                    </div>
                    <div class="comment-content">${escapeHTML(c.content)}</div>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <div class="comment-time">${time}</div>
                        ${pickerHtml}
                    </div>
                    <div class="reaction-bar mt-1">
                        ${reactionsHtml}
                    </div>
                </div>
            `);
        });
    }

    function postComment() {
        const content = $('#commentContent').val().trim();
        if (!content) return;
        
        setLoadingState('btnPostComment', true);
        $.ajax({
            url: `/api/matches/${currentMatchIdForComments}/comments`,
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({ content: content }),
            success: function() {
                $('#commentContent').val('');
                loadComments(currentMatchIdForComments);
            },
            complete: () => setLoadingState('btnPostComment', false)
        });
    }

    function toggleReaction(commentId, type) {
        $.ajax({
            url: `/api/comments/${commentId}/react`,
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({ reaction_type: type }),
            success: function() {
                loadComments(currentMatchIdForComments);
            }
        });
    }

    window.editComment = function(commentId) {
        const oldContent = window.allCommentsMap[commentId] || "";
        showPrompt("Sửa bình luận:", oldContent, function(newContent) {
            if (newContent === null || newContent.trim() === "" || newContent === oldContent) return;
            
            $.ajax({
                url: `/api/comments/${commentId}`,
                type: "PUT",
                contentType: "application/json",
                data: JSON.stringify({ content: newContent.trim() }),
                success: function() {
                    loadComments(currentMatchIdForComments);
                },
                error: (err) => showMsg(err.responseJSON?.detail || "Không thể sửa bình luận", "Lỗi")
            });
        });
    }

    window.deleteComment = function(commentId) {
        showConfirm("Bạn có chắc chắn muốn xóa bình luận này?", function() {
            $.ajax({
                url: `/api/comments/${commentId}`,
                type: "DELETE",
                success: function() {
                    loadComments(currentMatchIdForComments);
                },
                error: (err) => showMsg(err.responseJSON?.detail || "Không thể xóa bình luận", "Lỗi")
            });
        });
    }

    function submitUpdateProfile() {
        const newName = $('#settingsFullName').val().trim();
        if (!newName) return showMsg("Vui lòng nhập họ tên");
        
        setLoadingState('btnUpdateProfile', true);
        $.ajax({
            url: "/api/auth/update-profile",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({ full_name: newName }),
            success: function(res) {
                bootstrap.Modal.getInstance(document.getElementById('accountSettingsModal')).hide();
                showMsg(res.message, "Thành công");
                checkUser(); // Refresh UI
            },
            error: function(err) {
                showMsg(err.responseJSON?.detail || "Cập nhật thất bại", "Lỗi");
            },
            complete: () => setLoadingState('btnUpdateProfile', false)
        });
    }

    function submitChangePassword() {
        let oldPass = $('#oldPassword').val();
        let newPass = $('#newPassword').val();
        let confirmPass = $('#confirmNewPassword').val();

        if (!oldPass || !newPass) return showMsg('Vui lòng nhập đầy đủ thông tin');
        if (newPass !== confirmPass) return showMsg('Mật khẩu mới không khớp nhau');
        if (newPass.length < 6) return showMsg('Mật khẩu mới phải có ít nhất 6 ký tự');

        setLoadingState('btnChangePassword', true);
        $.ajax({
            url: "/api/auth/change-password",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({ old_password: oldPass, new_password: newPass }),
            success: function(res) {
                bootstrap.Modal.getInstance(document.getElementById('accountSettingsModal')).hide();
                showMsg(res.message, "Thành công");
            },
            error: function(err) {
                showMsg(err.responseJSON?.detail || "Đổi mật khẩu thất bại", "Lỗi");
            },
            complete: () => setLoadingState('btnChangePassword', false)
        });
    }
</script>
</body>
</html>
